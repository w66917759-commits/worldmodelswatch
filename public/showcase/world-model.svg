<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cinematic world model scene</title>
  <desc id="desc">A luminous generated world viewed through a cinematic command window.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07101d"/>
      <stop offset="0.48" stop-color="#132842"/>
      <stop offset="1" stop-color="#07110e"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0bd1c6"/>
      <stop offset="0.52" stop-color="#f2c15f"/>
      <stop offset="1" stop-color="#ff6d8d"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <path d="M0 720 C260 610 460 710 690 615 C950 506 1160 545 1600 430 L1600 1000 L0 1000 Z" fill="#111a22"/>
  <path d="M0 760 C290 664 514 744 754 650 C994 556 1214 584 1600 492 L1600 1000 L0 1000 Z" fill="#0b1119"/>
  <g opacity="0.48">
    <path d="M260 1000 L760 420 L1260 1000" fill="none" stroke="#b7fff5" stroke-width="2"/>
    <path d="M420 1000 L780 420 L1140 1000" fill="none" stroke="#b7fff5" stroke-width="1"/>
    <path d="M80 930 H1510 M170 850 H1440 M290 770 H1320 M400 695 H1210 M506 625 H1104" fill="none" stroke="#b7fff5" stroke-width="1"/>
  </g>
  <g filter="url(#softGlow)">
    <rect x="420" y="170" width="760" height="470" rx="32" fill="#0c1320" opacity="0.82" stroke="#8df6ff" stroke-width="3"/>
    <path d="M472 556 C585 430 689 455 777 352 C862 252 995 280 1134 200" fill="none" stroke="url(#ground)" stroke-width="16" stroke-linecap="round"/>
    <circle cx="580" cy="458" r="32" fill="#0bd1c6"/>
    <circle cx="780" cy="350" r="42" fill="#f2c15f"/>
    <circle cx="1038" cy="244" r="30" fill="#ff6d8d"/>
  </g>
  <g fill="#e9fbff">
    <rect x="488" y="218" width="172" height="18" rx="9"/>
    <rect x="488" y="254" width="112" height="12" rx="6" opacity="0.55"/>
    <rect x="912" y="528" width="190" height="14" rx="7" opacity="0.7"/>
    <rect x="912" y="560" width="126" height="12" rx="6" opacity="0.45"/>
  </g>
  <g opacity="0.74">
    <circle cx="255" cy="245" r="5" fill="#0bd1c6"/>
    <circle cx="1328" cy="180" r="7" fill="#f2c15f"/>
    <circle cx="1232" cy="705" r="6" fill="#ff6d8d"/>
    <circle cx="342" cy="660" r="4" fill="#e9fbff"/>
  </g>
</svg>
